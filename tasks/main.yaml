---
- name: Determine user running the role
  ansible.builtin.set_fact:
    _users_remote_user: "{{ ansible_env.get('SUDO_USER') | default(ansible_env.USER) }}"

- name: Validate that the user running the role would not lose sudo privileges
  vars:
    _entry: "{{ users_users | selectattr('username', 'equalto', _users_remote_user) | list }}"
  ansible.builtin.assert:
    that:
      - >-
        _entry | length == 0
        or (
          (_entry | first).sudo | default(false)
          and (_entry | first).state | default('present') != 'absent'
        )
    fail_msg: >-
      The user '{{ _users_remote_user }}' is running this role but would lose
      sudo privileges. Ensure '{{ _users_remote_user }}' has sudo: true in
      users_users and is not being removed.

- name: Validate sudo users have a password when users_sudo_require_password is enabled
  ansible.builtin.assert:
    that:
      - item.password is defined
      - item.password | length > 0
      - item.password != '!'
    fail_msg: >-
      User {{ item.username }} has sudo enabled but no password set.
      A password is required when users_sudo_require_password is true.
  when:
    - users_sudo_require_password
    - item.sudo | default(false)
    - not (item.disabled | default(false))
    - item.state | default('present') != 'absent'
  with_items: "{{ users_users }}"

- name: Manage /etc/sudoers.d/02-ansible-users file
  ansible.builtin.template:
    src: sudo-users.j2
    dest: /etc/sudoers.d/02-ansible-users
    owner: root
    group: root
    mode: "u=r,g=r,o="
    validate: visudo -cf %s

- name: Manage groups
  ansible.builtin.group:
    gid: "{{ item.gid | default(omit) }}"
    name: "{{ item.groupname }}"
    state: "{{ item.state }}"
  with_items: "{{ users_groups }}"

- name: Delete users
  ansible.builtin.user:
    name: "{{ item.username }}"
    state: absent
    remove: "{{ users_remove_files }}"
  when: item.state | default('present') == 'absent'
  with_items: "{{ users_users }}"

- name: Manage users
  ansible.builtin.user:
    name: "{{ item.username }}"
    state: present
    password: "{{ item.password | default('!') }}"
    comment: "{{ item.name | default(omit) }}"
    uid: "{{ item.uid | default(omit) }}"
    group: "{{ item.group | default(omit) }}"
    groups: "{{ item.groups if (item.groups is defined and item.groups | length > 0) else omit }}"
    append: "{{ item.groups is defined and item.groups | length > 0 }}"
    shell: "{{ item.shell | default(users_default_shell) }}"
    system: "{{ item.system | default(False) }}"
  when: item.state | default('present') != 'absent'
  with_items: "{{ users_users }}"

- name: Set secure permissions on user home directories
  ansible.builtin.file:
    path: "{{ item.home | default('/home/' + item.username) }}"
    mode: "u=rwx,g=rx,o="
    owner: "{{ item.username }}"
    state: directory
  when:
    - item.state | default('present') != 'absent'
    - not (item.system | default(False))
  with_items: "{{ users_users }}"

- name: Manage ssh authorized keys for each user (authorized_keys list)
  ansible.posix.authorized_key:
    user: "{{ item.0.username }}"
    state: "{{ 'absent' if (item.0.disabled | default(false)) else (item.1.state | default('present')) }}"
    key: "{{ item.1.key }}"
  loop: >-
    {{
      users_users
      | selectattr('authorized_keys', 'defined')
      | selectattr('authorized_keys', 'ne', none)
      | list
      | subelements('authorized_keys')
    }}
  loop_control:
    label: "{{ item.0.username }}"
  when: item.0.state | default('present') != 'absent'

- name: Manage ssh authorized keys for each user (ssh_pubkeys fallback)
  ansible.posix.authorized_key:
    user: "{{ item.username }}"
    state: "{{ (item.disabled | default(False) == False) | ternary('present', 'absent') }}"
    key: "{{ item.ssh_pubkeys }}"
    exclusive: true
  when:
    - item.state | default('present') != 'absent'
    - item.authorized_keys is not defined
    - item.ssh_pubkeys is defined
    - item.ssh_pubkeys is not none
  with_items: "{{ users_users }}"
